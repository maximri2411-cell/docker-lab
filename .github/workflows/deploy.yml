name: Deploy Pipeline

on:
  push:
    branches: [ main ]

permissions:
  id-token: write
  contents: read

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          build-args: |
            COMMIT_SHA=${{ github.sha }}
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/student-api:${{ github.sha }}
            ${{ secrets.DOCKERHUB_USERNAME }}/student-api:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: us-east-1

      - name: Sync MongoDB URI to SSM Parameter Store
        run: |
          aws ssm put-parameter \
            --name /student-api/mongodb/uri \
            --value "${{ secrets.MONGODB_URI }}" \
            --type SecureString \
            --overwrite

      - name: Deploy to Auto Scaling Group via SSM
        run: |
          # 1. Capture ASG InService Instance IDs
          INSTANCE_IDS=$(aws autoscaling describe-auto-scaling-groups \
            --auto-scaling-group-names "${{ secrets.ASG_NAME }}" \
            --query "AutoScalingGroups[0].Instances[?LifecycleState=='InService'].InstanceId" \
            --output text)

          if [ -z "$INSTANCE_IDS" ]; then
            echo "Error: No InService instances found in ASG '${{ secrets.ASG_NAME }}'."
            exit 1
          fi

          echo "Target instances for deployment: $INSTANCE_IDS"

          # 2. Trigger SSM Run Command on these instances
          COMMAND_ID=$(aws ssm send-command \
            --instance-ids $INSTANCE_IDS \
            --document-name "AWS-RunShellScript" \
            --comment "Deploy student-api container" \
            --parameters 'commands=[
              "# Wait for user data to finish installing AWS CLI and Docker",
              "for i in $(seq 1 30); do /usr/local/bin/aws --version >/dev/null 2>&1 && break; echo \"Waiting for AWS CLI... $i/30\"; sleep 10; done",
              "export PATH=$PATH:/usr/local/bin",
              "for i in $(seq 1 30); do docker info >/dev/null 2>&1 && break; echo \"Waiting for Docker... $i/30\"; sleep 10; done",
              "DH_USER=$(aws ssm get-parameter --name /student-api/dockerhub/username --query Parameter.Value --output text)",
              "DH_TOKEN=$(aws ssm get-parameter --name /student-api/dockerhub/token --with-decryption --query Parameter.Value --output text)",
              "MONGO_URI=$(aws ssm get-parameter --name /student-api/mongodb/uri --with-decryption --query Parameter.Value --output text)",
              "echo \"$DH_TOKEN\" | docker login --username \"$DH_USER\" --password-stdin",
              "IMAGE=\"$DH_USER/student-api:${{ github.sha }}\"",
              "docker pull $IMAGE",
              "docker stop student-api >/dev/null 2>&1 || true",
              "docker rm student-api >/dev/null 2>&1 || true",
              "docker run -d --name student-api --restart unless-stopped -p 3000:3000 -e COMMIT_SHA=${{ github.sha }} -e MONGODB_URI=\"$MONGO_URI\" $IMAGE"
            ]' \
            --query "Command.CommandId" \
            --output text)

          echo "Command sent successfully. Command ID: $COMMAND_ID"
          echo "Waiting for command execution to complete..."

          # 3. Wait for the command to finish executing on the first instance
          FIRST_INSTANCE=$(echo $INSTANCE_IDS | awk '{print $1}')
          aws ssm wait command-executed \
            --command-id "$COMMAND_ID" \
            --instance-id "$FIRST_INSTANCE"

          # 4. Check status on all target instances
          FAILED=0
          for INSTANCE_ID in $INSTANCE_IDS; do
            STATUS=$(aws ssm get-command-invocation \
              --command-id "$COMMAND_ID" \
              --instance-id "$INSTANCE_ID" \
              --query "Status" \
              --output text)
            echo "Instance $INSTANCE_ID status: $STATUS"
            if [ "$STATUS" != "Success" ]; then
              echo "Error: Command failed on instance $INSTANCE_ID"
              FAILED=1
            fi
          done

          if [ "$FAILED" -ne 0 ]; then
            echo "Deployment failed on one or more instances."
            exit 1
          fi

          echo "Deployment succeeded on all instances!"
